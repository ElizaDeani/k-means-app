<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Cluster - Segmentasi Lowongan</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container">
            <span class="navbar-brand">
                <i class="fas fa-layer-group me-2"></i>
                Detail Cluster
            </span>
            <div>
                <a href="dashboard.html" class="btn btn-outline-light btn-sm me-2">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </a>
                <a href="index.html" class="btn btn-outline-light btn-sm">
                    <i class="fas fa-home"></i> Home
                </a>
            </div>
        </div>
    </nav>
    
    <div class="container mt-4">
        <div class="d-flex align-items-center mb-4">
            <button class="back-btn me-3" onclick="history.back()">
                <i class="fas fa-arrow-left"></i> Kembali
            </button>
            <h3 class="mb-0"><i class="fas fa-chart-pie text-primary"></i> Analisis per Cluster</h3>
        </div>
        
        <div id="noDataAlert" class="alert alert-warning text-center" style="display: none;">
            <i class="fas fa-exclamation-triangle"></i> Belum ada data clustering.
            <a href="index.html" class="alert-link">Upload data terlebih dahulu</a>
        </div>
        
        <div id="clusterContent" style="display: none;"></div>
    </div>
    
    <script>
        const data = JSON.parse(sessionStorage.getItem('clusteringData'));
        
        if (!data) {
            document.getElementById('noDataAlert').style.display = 'block';
        } else {
            document.getElementById('noDataAlert').style.display = 'none';
            renderClusterDetail(data);
        }
        
        function renderClusterDetail(data) {
            let html = '';
            
            data.clusters.forEach((cluster, idx) => {
                const clusterJobs = data.jobs.filter(job => job.cluster === cluster.id);
                const clusterClass = `cluster-${cluster.id % 5}`;
                
                html += `
                    <div class="card shadow-sm mb-4 cluster-card ${clusterClass}">
                        <div class="card-header bg-white">
                            <h4 class="mb-0">
                                <span class="badge bg-primary me-2">Cluster ${cluster.id}</span>
                                <strong>${cluster.name}</strong>
                                <span class="badge bg-secondary float-end">${cluster.size} lowongan (${cluster.percentage.toFixed(1)}%)</span>
                            </h4>
                        </div>
                        <div class="card-body">
                            <h5><i class="fas fa-star text-warning"></i> Top 10 Skills (TF-IDF Tertinggi)</h5>
                            <div class="mb-4">
                                ${cluster.top_skills.map(s => `<span class="skill-tag skill-tag-lg high">${s[0]}</span>`).join('')}
                            </div>
                            
                            <h5><i class="fas fa-list"></i> Semua Skills dalam Cluster</h5>
                            <div class="mb-4">
                                ${Object.keys(cluster.all_skills).slice(0, 30).map(skill => `<span class="skill-tag">${skill}</span>`).join('')}
                                ${Object.keys(cluster.all_skills).length > 30 ? `<span class="skill-tag">+${Object.keys(cluster.all_skills).length - 30} skill lainnya</span>` : ''}
                            </div>
                            
                            <h5><i class="fas fa-briefcase"></i> Contoh Lowongan</h5>
                            <ul class="mb-4">
                                ${cluster.sample_jobs.map(job => `<li>${job}</li>`).join('')}
                            </ul>
                            
                            <h5><i class="fas fa-table"></i> Semua Lowongan dalam Cluster Ini</h5>
                            <div class="table-responsive">
                                <table class="table table-sm table-hover">
                                    <thead class="table-light">
                                        <tr><th>#</th><th>Judul Lowongan</th><th>Platform</th><th>Skills (5 pertama)</th></tr>
                                    </thead>
                                    <tbody>
                                        ${clusterJobs.map((job, jobIdx) => `
                                            <tr>
                                                <td>${jobIdx + 1}</td>
                                                <td><strong>${job.judul}</strong></td>
                                                <td><span class="badge bg-info">${job.platform}</span></td>
                                                <td>${job.skills.slice(0, 5).map(s => `<span class="skill-tag">${s.trim()}</span>`).join('')}</td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            document.getElementById('clusterContent').innerHTML = html;
            document.getElementById('clusterContent').style.display = 'block';
        }
    </script>
</body>
</html>
