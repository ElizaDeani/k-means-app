<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Export Data - Segmentasi Lowongan</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container">
            <span class="navbar-brand">
                <i class="fas fa-download me-2"></i>
                Export Data
            </span>
            <div>
                <a href="dashboard.html" class="btn btn-outline-light btn-sm me-2">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </a>
                <a href="index.html" class="btn btn-outline-light btn-sm">
                    <i class="fas fa-home"></i> Home
                </a>
            </div>
        </div>
    </nav>
    
    <div class="container mt-4">
        <div class="d-flex align-items-center mb-4">
            <button class="back-btn me-3" onclick="history.back()">
                <i class="fas fa-arrow-left"></i> Kembali
            </button>
            <h3 class="mb-0"><i class="fas fa-file-export text-primary"></i> Export Hasil Clustering</h3>
        </div>
        
        <div id="noDataAlert" class="alert alert-warning text-center" style="display: none;">
            <i class="fas fa-exclamation-triangle"></i> Belum ada data clustering.
            <a href="index.html" class="alert-link">Upload data terlebih dahulu</a>
        </div>
        
        <div id="exportContent" style="display: none;"></div>
    </div>
    
    <script>
        const data = JSON.parse(sessionStorage.getItem('clusteringData'));
        
        if (!data) {
            document.getElementById('noDataAlert').style.display = 'block';
        } else {
            document.getElementById('noDataAlert').style.display = 'none';
            renderExport(data);
        }
        
        function renderExport(data) {
            const html = `
                <div class="row">
                    <div class="col-md-4">
                        <div class="export-card text-center" onclick="exportData('excel')">
                            <div class="export-icon text-success">
                                <i class="fas fa-file-excel"></i>
                            </div>
                            <h5>Export ke Excel</h5>
                            <p class="text-muted small">Download file Excel (.xlsx) dengan semua data lowongan dan cluster</p>
                            <span class="badge bg-success">Rekomendasi</span>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="export-card text-center" onclick="exportData('csv')">
                            <div class="export-icon text-info">
                                <i class="fas fa-file-csv"></i>
                            </div>
                            <h5>Export ke CSV</h5>
                            <p class="text-muted small">Download file CSV untuk dibuka di Excel atau Google Sheets</p>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="export-card text-center" onclick="exportData('json')">
                            <div class="export-icon text-warning">
                                <i class="fas fa-file-code"></i>
                            </div>
                            <h5>Export ke JSON</h5>
                            <p class="text-muted small">Download file JSON untuk keperluan pengembangan</p>
                        </div>
                    </div>
                </div>
                
                <div class="card shadow-sm mt-4">
                    <div class="card-header bg-white">
                        <h5 class="mb-0"><i class="fas fa-chart-simple"></i> Ringkasan yang Akan Diexport</h5>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-4">
                                <div class="text-center p-3 bg-light rounded">
                                    <h4 class="text-primary">${data.n_samples}</h4>
                                    <small>Total Lowongan</small>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="text-center p-3 bg-light rounded">
                                    <h4 class="text-primary">${data.n_clusters}</h4>
                                    <small>Jumlah Cluster</small>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="text-center p-3 bg-light rounded">
                                    <h4 class="text-primary">${data.clusters.map(c => c.name).join(', ')}</h4>
                                    <small>Nama Cluster</small>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('exportContent').innerHTML = html;
            document.getElementById('exportContent').style.display = 'block';
        }
        
        function exportData(format) {
            if (!data) return;
            
            if (format === 'excel' || format === 'csv') {
                exportToCSV(data);
            } else if (format === 'json') {
                exportToJSON(data);
            }
        }
        
        function exportToCSV(data) {
            const headers = ['ID', 'Judul', 'Platform', 'Cluster ID', 'Cluster Name', 'Skills'];
            const rows = data.jobs.map(job => [
                job.id + 1,
                job.judul,
                job.platform,
                job.cluster,
                job.cluster_name,
                job.skills.join(', ')
            ]);
            
            const csvContent = [headers, ...rows].map(row => row.map(cell => `"${cell}"`).join(',')).join('\n');
            downloadFile(csvContent, 'hasil_clustering.csv', 'text/csv');
        }
        
        function exportToJSON(data) {
            const exportData = {
                metadata: {
                    total_jobs: data.n_samples,
                    total_clusters: data.n_clusters,
                    silhouette_score: data.evaluation.silhouette_score,
                    davies_bouldin_score: data.evaluation.davies_bouldin_score,
                    calinski_harabasz_score: data.evaluation.calinski_harabasz_score,
                    export_date: new Date().toISOString()
                },
                clusters: data.clusters.map(c => ({
                    id: c.id,
                    name: c.name,
                    size: c.size,
                    percentage: c.percentage,
                    top_skills: c.top_skills.map(s => s[0]),
                    all_skills: Object.keys(c.all_skills)
                })),
                jobs: data.jobs.map(job => ({
                    id: job.id + 1,
                    judul: job.judul,
                    platform: job.platform,
                    cluster_id: job.cluster,
                    cluster_name: job.cluster_name,
                    skills: job.skills
                }))
            };
            
            const jsonContent = JSON.stringify(exportData, null, 2);
            downloadFile(jsonContent, 'hasil_clustering.json', 'application/json');
        }
        
        function downloadFile(content, filename, mimeType) {
            const blob = new Blob([content], { type: mimeType });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            link.click();
            URL.revokeObjectURL(link.href);
        }
    </script>
</body>
</html>
